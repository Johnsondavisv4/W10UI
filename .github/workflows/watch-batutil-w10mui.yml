name: Watch BatUtil W10MUI and UUP

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest
    env:
      EXTERNAL_OWNER: abbodi1406
      EXTERNAL_REPO: BatUtil
      EXTERNAL_BRANCH: master
      WATCH_PREFIX_1: W10MUI/
      WATCH_PREFIX_2: uup-converter-wimlib/
      STATE_FILE: .github/state/batutil_w10mui_last_sha.txt

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get current upstream SHA
        id: current
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          sha=$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${EXTERNAL_OWNER}/${EXTERNAL_REPO}/commits/${EXTERNAL_BRANCH}" | jq -r '.sha')
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Read stored SHA from repo file
        id: stored
        run: |
          set -euo pipefail
          if [ -f "${STATE_FILE}" ]; then
            old_sha=$(tr -d '[:space:]' < "${STATE_FILE}")
          else
            old_sha=""
          fi
          echo "sha=${old_sha}" >> "$GITHUB_OUTPUT"

      - name: Compare commits and detect changes
        id: compare
        env:
          OLD_SHA: ${{ steps.stored.outputs.sha }}
          NEW_SHA: ${{ steps.current.outputs.sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          sync_needed=false
          changed_count=0
          top_dirs=""
          sub_dirs=""

          if [ -z "${OLD_SHA}" ]; then
            sync_needed=true
            {
              echo "### Watch BatUtil"
              echo "Primera ejecución: no hay SHA previo."
              echo "Se forzará sincronización inicial."
            } >> "$GITHUB_STEP_SUMMARY"
          elif [ "${OLD_SHA}" = "${NEW_SHA}" ]; then
            {
              echo "### Watch BatUtil"
              echo "Sin cambios upstream: ${NEW_SHA}"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            compare_url="https://api.github.com/repos/${EXTERNAL_OWNER}/${EXTERNAL_REPO}/compare/${OLD_SHA}...${NEW_SHA}"
            curl -fsSL \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$compare_url" > compare.json

            jq -r '.files[].filename' compare.json > files_all.txt
            grep -E "^(${WATCH_PREFIX_1}|${WATCH_PREFIX_2})" files_all.txt > files_watched.txt || true

            changed_count=$(wc -l < files_watched.txt | tr -d ' ')
            if [ "${changed_count}" -gt 0 ]; then
              sync_needed=true
            fi

            top_dirs=$(awk -F/ '{print $1}' files_watched.txt | sort -u | paste -sd ',' - || true)
            sub_dirs=$(awk -F/ 'NF>=2{print $1"/"$2}' files_watched.txt | sort -u | paste -sd ',' - || true)

            {
              echo "### Watch BatUtil"
              echo "Comparando: ${OLD_SHA} -> ${NEW_SHA}"
              echo "Cambios en carpetas vigiladas: ${changed_count}"
              if [ "${changed_count}" -gt 0 ]; then
                echo ""
                echo "Carpetas detectadas:"
                echo "- Top: ${top_dirs}"
                echo "- Sub: ${sub_dirs}"
                echo ""
                echo "Archivos:"
                sed 's/^/- /' files_watched.txt
              fi
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "sync_needed=${sync_needed}" >> "$GITHUB_OUTPUT"
          echo "changed_count=${changed_count}" >> "$GITHUB_OUTPUT"
          echo "top_dirs=${top_dirs}" >> "$GITHUB_OUTPUT"
          echo "sub_dirs=${sub_dirs}" >> "$GITHUB_OUTPUT"

      - name: Replace local folders from upstream
        if: steps.compare.outputs.sync_needed == 'true'
        run: |
          set -euo pipefail

          tmp_dir=$(mktemp -d)
          git clone --depth 1 --filter=blob:none --sparse "https://github.com/${EXTERNAL_OWNER}/${EXTERNAL_REPO}.git" "$tmp_dir/src"
          git -C "$tmp_dir/src" sparse-checkout set W10MUI uup-converter-wimlib

          # --- W10MUI ---
          rm -rf W10MUI
          mkdir -p W10MUI
          cp -a "$tmp_dir/src/W10MUI/." W10MUI/
          
          # Copiar SOLO libwim-15.dll y wimlib-imagex.exe a W10MUI/Updates/bin (32 bits y 64 bits)
          mkdir -p W10MUI/Updates/bin/bin64
          
          # Archivos de 32 bits
          cp "$tmp_dir/src/uup-converter-wimlib/bin/libwim-15.dll" W10MUI/Updates/bin/
          cp "$tmp_dir/src/uup-converter-wimlib/bin/wimlib-imagex.exe" W10MUI/Updates/bin/
          
          # Archivos de 64 bits
          cp "$tmp_dir/src/uup-converter-wimlib/bin/bin64/libwim-15.dll" W10MUI/Updates/bin/bin64/
          cp "$tmp_dir/src/uup-converter-wimlib/bin/bin64/wimlib-imagex.exe" W10MUI/Updates/bin/bin64/

          # --- UUP-CONVERTER-WIMLIB ---
          # Se copia entera, manteniendo sus propios binarios intactos para su uso independiente
          rm -rf uup-converter-wimlib
          mkdir -p uup-converter-wimlib
          cp -a "$tmp_dir/src/uup-converter-wimlib/." uup-converter-wimlib/
          
          rm -rf "$tmp_dir"

      - name: Apply local customizations
        if: steps.compare.outputs.sync_needed == 'true'
        run: |
          set -euo pipefail

          # --- PERSONALIZACIÓN W10MUI ---
          mkdir -p W10MUI/Langs W10MUI/OnDemand W10MUI/Updates
          find W10MUI/Langs -mindepth 1 -delete
          find W10MUI/OnDemand -mindepth 1 -delete

          if [ ! -f W10MUI.cmd ]; then
            echo "No existe W10MUI.cmd en la raiz del repo."
            exit 1
          fi
          cp -f W10MUI.cmd W10MUI/W10MUI.cmd

          if [ ! -f W10UI.ini ]; then
            echo "No existe W10UI.ini en la raiz del repo."
            exit 1
          fi
          cp -f W10UI.ini W10MUI/Updates/W10UI.ini

          rm -f W10MUI/aria2_links.txt
          rm -f W10MUI/aria2_uupdump-ReadMe.txt
          rm -f W10MUI/aria2_uupdump.cmd
          rm -f W10MUI/README-W10MUI_Mini.md
          rm -f W10MUI/README.md
          rm -f W10MUI/W10MUI_Mini.cmd


          # --- PERSONALIZACIÓN UUP-CONVERTER-WIMLIB ---
          mkdir -p uup-converter-wimlib/UUPs
          find uup-converter-wimlib/UUPs -mindepth 1 -delete

          rm -f uup-converter-wimlib/CustomAppsList.txt
          rm -f uup-converter-wimlib/multi_arch_iso.cmd
          rm -f uup-converter-wimlib/ReadMe.html
          rm -f uup-converter-wimlib/README.md

          if [ ! -f ConvertConfig.ini ]; then
            echo "No existe ConvertConfig.ini en la raiz del repo local."
            exit 1
          fi
          cp -f ConvertConfig.ini uup-converter-wimlib/ConvertConfig.ini
          cp -f CustomAppsList.txt uup-converter-wimlib/CustomAppsList.txt
          cp -f ei.cfg uup-converter-wimlib/ei.cfg

      - name: Update local state file after sync
        if: steps.compare.outputs.sync_needed == 'true'
        env:
          NEW_SHA: ${{ steps.current.outputs.sha }}
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "${STATE_FILE}")"
          printf '%s\n' "${NEW_SHA}" > "${STATE_FILE}"

      - name: Commit and push changes
        if: steps.compare.outputs.sync_needed == 'true'
        env:
          NEW_SHA: ${{ steps.current.outputs.sha }}
        run: |
          set -euo pipefail
          if git status --porcelain | grep . >/dev/null; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A W10MUI uup-converter-wimlib "${STATE_FILE}"
            git commit -m "chore: sync W10MUI y uup-converter-wimlib desde ${EXTERNAL_OWNER}/${EXTERNAL_REPO}@${NEW_SHA}"
            git push
            echo "Sincronización aplicada y publicada." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No hubo diferencias reales para publicar." >> "$GITHUB_STEP_SUMMARY"
          fi